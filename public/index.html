<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daily Challenge Pomodoro</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="min-h-screen flex items-center justify-center p-6">
    <main class="w-full max-w-xl bg-white/80 backdrop-blur-md border border-orange-200 rounded-3xl p-8">
      <h1 class="text-4xl font-black tracking-tight text-orange-700">Daily Challenge Pomodoro</h1>
      <p class="mt-2 text-slate-700">Stay focused, then recover. Repeat.</p>

      <section class="mt-8 flex flex-col items-center gap-6">
        <div class="timer-ring h-64 w-64 rounded-full border-[14px] border-teal-700 bg-amber-50 flex items-center justify-center">
          <span id="time" class="text-6xl font-bold text-orange-800">25:00</span>
        </div>

        <p id="phase" class="text-lg font-semibold uppercase tracking-wider text-teal-800">Focus Session</p>

        <div class="flex gap-3 flex-wrap justify-center">
          <button id="startPause" class="px-6 py-3 rounded-full bg-orange-600 text-white font-semibold hover:bg-orange-700">Start</button>
          <button id="reset" class="px-6 py-3 rounded-full bg-teal-700 text-white font-semibold hover:bg-teal-800">Reset</button>
          <button id="skip" class="px-6 py-3 rounded-full bg-white border border-slate-300 text-slate-700 font-semibold hover:bg-slate-100">Skip</button>
        </div>

        <div class="grid grid-cols-2 gap-3 text-sm w-full max-w-xs">
          <div class="rounded-2xl bg-orange-100 p-3 text-center">
            <p class="font-semibold text-orange-900">Focus</p>
            <p class="text-xl font-bold text-orange-700">25m</p>
          </div>
          <div class="rounded-2xl bg-teal-100 p-3 text-center">
            <p class="font-semibold text-teal-900">Break</p>
            <p class="text-xl font-bold text-teal-700">5m</p>
          </div>
        </div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
